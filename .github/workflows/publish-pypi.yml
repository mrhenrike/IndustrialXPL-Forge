name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Target registry"
        required: true
        default: "pypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade "build" "twine>=6.1" "setuptools>=68"

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify artifacts
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/industrialxpl/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install twine
        run: pip install --upgrade twine

      - name: Publish to TestPyPI via twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::error::TEST_PYPI_API_TOKEN secret is not set."
            echo "Go to: https://test.pypi.org/manage/account/token/"
            echo "Add it via: GitHub Settings > Secrets > Actions > New repository secret"
            exit 1
          fi
          twine upload --repository testpypi --skip-existing dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/industrialxpl/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install twine
        run: pip install --upgrade twine

      - name: Publish to PyPI via twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::error::PYPI_API_TOKEN secret is not set."
            echo "1. Go to https://pypi.org/manage/account/token/ and create a token for 'industrialxpl'"
            echo "2. Run: gh secret set PYPI_API_TOKEN --repo mrhenrike/IndustrialXPL-Forge"
            exit 1
          fi
          twine upload --skip-existing dist/*
